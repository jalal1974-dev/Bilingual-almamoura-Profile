kind = "web"
previewPath = "/"
title = "Al-Maamoura Advisory"
version = "1.0.0"
id = "artifacts/almaamoura"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23933

[services.development]
run = "pnpm --filter @workspace/almaamoura run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/almaamoura", "run", "build" ]
publicDir = "artifacts/almaamoura/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23933"
BASE_PATH = "/"
